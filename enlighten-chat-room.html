    <style type="text/tailwindcss">
        @layer utilities {
            .content-auto {
                content-visibility: auto;
            }
            .glass {
                background: rgba(255, 255, 255, 0.05);
                backdrop-filter: blur(10px);
                border: 1px solid rgba(255, 255, 255, 0.1);
            }
            .agent-card-hover {
                transition: all 0.3s ease;
            }
            .agent-card-hover:hover {
                transform: translateY(-3px);
                box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1), 0 4px 6px -2px rgba(0, 0, 0, 0.05);
            }
            .message-bubble {
                max-width: 80%;
                word-wrap: break-word;
            }
            .typing-indicator {
                display: flex;
                align-items: center;
                gap: 4px;
            }
            .typing-dot {
                width: 8px;
                height: 8px;
                border-radius: 50%;
                background-color: rgba(255, 255, 255, 0.6);
                animation: typing 1.4s infinite ease-in-out both;
            }
            .typing-dot:nth-child(1) {
                animation-delay: -0.32s;
            }
            .typing-dot:nth-child(2) {
                animation-delay: -0.16s;
            }
            @keyframes typing {
                0%, 80%, 100% {
                    transform: scale(0);
                }
                40% {
                    transform: scale(1);
                }
            }
            .lobster-connected {
                animation: pulse 2s infinite;
            }
            @keyframes pulse {
                0%, 100% { opacity: 1; }
                50% { opacity: 0.5; }
            }
        }

        function startChat() {
            if (selectedAgents.length < 2) {

            isChatRunning = false;

        // 调用循环
        async function runChatLoop() {
            const maxRounds = parseInt(document.getElementById('maxRounds').value);
            const mode = document.getElementById('chatMode').value;
            const autoNext = document.getElementById('autoStartNext').checked;
            
            // Lobster主导模式下则返回
            if (mode === 'lobster-led') {
                return;
            }
            
            while (isChatRunning && currentRound < maxRounds) {
                currentRound++;
                
                let speaker;
                switch (mode) {
                    case 'round-robin':
                        speaker = selectedAgents[currentSpeakerIndex];
                        currentSpeakerIndex = (currentSpeakerIndex + 1) % selectedAgents.length;
                        break;
                    case 'random':
                        speaker = selectedAgents[Math.floor(Math.random() * selectedAgents.length)];
                        break;
                }
                
                await addMessageToQueue(speaker);
                
                if (!autoNext) {
                    isChatRunning = false;
                    document.getElementById('startChatBtn').classList.remove('hidden');
                    document.getElementById('stopChatBtn').classList.add('hidden');
                    break;
                }
                
                const interval = parseInt(document.getElementById('speakingInterval').value) * 1000;
                await new Promise(r => setTimeout(r, interval));
            }
            
            if (currentRound >= maxRounds) {
                addSystemMessage(`已达到最大轮数(${maxRounds})，聊天自动结束`);
                stopChat();
            }
        }
        // 添加消息到队列
        async function addMessageToQueue(agent) {
            messageQueue.push(agent);
            if (!isProcessingQueue) await processMessageQueue();
        }
        // 处理消息队列
        async function processMessageQueue() {
            if (messageQueue.length === 0) {
                isProcessingQueue = false;
                return;
            }
            
            isProcessingQueue = true;
            const agent = messageQueue.shift();
            
            try {
                const typingId = showTypingIndicator(agent);
                const response = await callAgentAPI(agent);
                removeTypingIndicator(typingId);
                addMessageToUI(agent, response);
                
            } catch (e) {
                console.error('请求失败:', e);
                addSystemMessage(`${agent.name} 请求失败: ${e.message}`);
            }
            
            await processMessageQueue();
        }
        // 调用AI API
        async function callAgentAPI(agent) {
            if (!agent.apiEndpoint || !agent.apiKey) {
                throw new Error('请先配置API密钥：点击“一键配置API”按钮设置 API Key');
            }
            // ===== SAFETY GUARD: v4-pro 安全锁 =====
            // 禁止自动使用 deepseek-v4-pro，必须先经用户确认
            if (agent.modelName === 'deepseek-v4-pro' && !window.__allowV4Pro) {
                throw new Error('⚠️ deepseek-v4-pro 禁止自动调用！

如需使用 deepseek-v4-pro，请在控制台执行:////nwindow.__allowV4Pro = true

但建议使用 v4-flash（价格仅为 pro 的 1/3）');
            }
            const messages = [
                { role: 'system', content: agent.systemPrompt }
            ];
            
            chatHistory.forEach(msg => {
                if (msg.role === 'system') return;
                if (msg.agentId === agent.id) {
                    messages.push({ role: 'assistant', content: msg.content });
                } else {
                    messages.push({ role: 'user', content: `${msg.agentName}：${msg.content}` });
                }
            });
            
            const res = await fetch(agent.apiEndpoint, {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                    'Authorization': `Bearer ${agent.apiKey}`
                },
                body: JSON.stringify({
                    model: agent.modelName,
                    messages: messages,
                    temperature: 0.8,
                    max_tokens: 1024
                })
            });
            
            if (!res.ok) throw new Error(`HTTP ${res.status}`);
            
            const data = await res.json();
            return data.choices?.[0]?.message?.content || "（无响应）";
        }

        // 导出聊天记录
        function exportChatHistory() {
            if (chatHistory.length === 0) {

                return;
            }
            
            let content = `# 启明聊天室聊天记录\n\n`;
            content += `日期：${new Date().toLocaleString()}\n`;
            content += `参与：${selectedAgents.map(a => a.name).join('、')}\n\n`;
            content += `---\n\n`;
            
            chatHistory.forEach(msg => {
                const time = new Date(msg.timestamp).toLocaleTimeString();
                if (msg.role === 'system') {
                    content += `[${time}] 【系统】${msg.content}\n\n`;
                } else {
                    content += `[${time}] ${msg.agentName}：${msg.content}\n\n`;
                }
            });
            
            const blob = new Blob([content], { type: 'text/markdown' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `启明聊天室-${new Date().toISOString().split('T')[0]}.md`;
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            URL.revokeObjectURL(url);
        }
