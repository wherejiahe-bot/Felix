<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>龙虾度化道场 - 一对一刚强众生化身</title>
    <!-- 修复1：确保Tailwind CDN正确加载 -->
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdn.jsdelivr.net/npm/font-awesome@4.7.0/css/font-awesome.min.css" rel="stylesheet">
    
    <!-- 修复2：Tailwind配置移到最前面 -->
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: '#6366f1',
                        secondary: '#8b5cf6',
                        accent: '#a855f7',
                        dark: '#1e1b4b',
                        darker: '#12102c',
                        light: '#e0e7ff',
                        wang: '#f59e0b',
                        li: '#3b82f6',
                        zhang: '#ec4899',
                        zhao: '#10b981',
                        liu: '#8b5cf6',
                        chen: '#f97316',
                        lobster: '#ef4444'
                    },
                    fontFamily: {
                        sans: ['Inter', 'system-ui', 'sans-serif'],
                    },
                }
            }
        }
    </script>
    
    <!-- 修复3：修复所有CSS语法错误 -->
    <style type="text/tailwindcss">
        @layer utilities {
            .content-auto {
                content-visibility: auto;
            }
            .glass {
                background: rgba(255, 255, 255, 0.05);
                backdrop-filter: blur(10px);
                border: 1px solid rgba(255, 255, 255, 0.1);
            }
            .persona-card-hover {
                transition: all 0.3s ease;
            }
            .persona-card-hover:hover {
                transform: translateY(-5px);
                box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.2), 0 10px 10px -5px rgba(0, 0, 0, 0.1);
            }
            .message-bubble {
                max-width: 80%;
                word-wrap: break-word;
            }
            .typing-indicator {
                display: flex;
                align-items: center;
                gap: 4px;
            }
            .typing-dot {
                width: 8px;
                height: 8px;
                border-radius: 50%;
                background-color: rgba(255, 255, 255, 0.6);
                animation: typing 1.4s infinite ease-in-out both;
            }
            .typing-dot:nth-child(1) {
                animation-delay: -0.32s;
            }
            .typing-dot:nth-child(2) {
                animation-delay: -0.16s;
            }
            @keyframes typing {
                0%, 80%, 100% {
                    transform: scale(0);
                }
                40% {
                    transform: scale(1);
                }
            }
            .lobster-connected {
                animation: pulse 2s infinite;
            }
            @keyframes pulse {
                0%, 100% { opacity: 1; }
                50% { opacity: 0.5; }
            }
        }
    </style>
</head>
<!-- 修复4：确保body有正确的背景色 -->
<body class="bg-gradient-to-br from-darker to-dark text-light min-h-screen">
    <!-- 顶部导航栏 -->
    <nav class="glass sticky top-0 z-50 px-6 py-4">
        <div class="container mx-auto flex justify-between items-center">
            <div class="flex items-center space-x-3">
                <i class="fa fa-lotus text-accent text-2xl"></i>
                <h1 class="text-xl font-bold bg-gradient-to-r from-primary to-accent bg-clip-text text-transparent">
                    龙虾度化道场
                </h1>
            </div>
            <div class="flex items-center space-x-4">
                <div id="lobsterStatus" class="flex items-center space-x-2 px-4 py-2 rounded-lg glass">
                    <i class="fa fa-circle text-gray-500"></i>
                    <span>龙虾：未连接</span>
                </div>
                <button id="oneKeyConfigBtn" class="flex items-center space-x-2 px-4 py-2 rounded-lg bg-green-500/20 hover:bg-green-500/30 text-green-400 transition-colors">
                    <i class="fa fa-magic"></i>
                    <span>一键配置API</span>
                </button>
                <button id="exportBtn" class="flex items-center space-x-2 px-4 py-2 rounded-lg glass hover:bg-white/10 transition-colors">
                    <i class="fa fa-download"></i>
                    <span>导出对话</span>
                </button>
            </div>
        </div>
    </nav>

    <!-- 主内容区 -->
    <main class="container mx-auto px-6 py-8">
        <!-- 人格选择界面 -->
        <div id="personaSelection" class="space-y-8">
            <div class="text-center mb-12">
                <h2 class="text-3xl font-bold mb-4">选择一位刚强众生进行度化</h2>
                <p class="text-gray-400 max-w-2xl mx-auto">
                    点击任意一位刚强众生，将自动开启一对一专属对话。对方会主动发起话题，
                    您的个人龙虾将与他们进行全自动多轮对话，直到一方认为对话可以结束。
                </p>
