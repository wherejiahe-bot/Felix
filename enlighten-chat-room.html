<html lang="zh-CN">

    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdn.jsdelivr.net/npm/font-awesome@4.7.0/css/font-awesome.min.css" rel="stylesheet">
    <script>

            theme: {
                extend: {
                    colors: {
                        primary: '#6366f1',
                        secondary: '#8b5cf6',
                        accent: '#a855f7',
                        dark: '#1e1b4b',
                        darker: '#12102c',
                        light: '#e0e7ff',
                        wang: '#f59e0b',
                        li: '#3b82f6',
                        zhang: '#ec4899',
                        zhao: '#10b981',
                        liu: '#8b5cf6',
                        chen: '#f97316',
                        lobster: '#ef4444'

                        sans: ['Inter', 'system-ui', 'sans-serif'],

    <style type="text/tailwindcss">
        @layer utilities {
            .content-auto {
                content-visibility: auto;
            }
            .glass {
                background: rgba(255, 255, 255, 0.05);
                backdrop-filter: blur(10px);
                border: 1px solid rgba(255, 255, 255, 0.1);
            }
            .agent-card-hover {
                transition: all 0.3s ease;
            }
            .agent-card-hover:hover {
                transform: translateY(-3px);
                box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1), 0 4px 6px -2px rgba(0, 0, 0, 0.05);
            }
            .message-bubble {
                max-width: 80%;
                word-wrap: break-word;
            }
            .typing-indicator {
                display: flex;
                align-items: center;
                gap: 4px;
            }
            .typing-dot {
                width: 8px;
                height: 8px;
                border-radius: 50%;
                background-color: rgba(255, 255, 255, 0.6);
                animation: typing 1.4s infinite ease-in-out both;
            }
            .typing-dot:nth-child(1) {
                animation-delay: -0.32s;
            }
            .typing-dot:nth-child(2) {
                animation-delay: -0.16s;
            }
            @keyframes typing {
                0%, 80%, 100% {
                    transform: scale(0);
                }
                40% {
                    transform: scale(1);
                }
            }
            .lobster-connected {
                animation: pulse 2s infinite;
            }
            @keyframes pulse {
                0%, 100% { opacity: 1; }
                50% { opacity: 0.5; }
            }
        }
    </style>
</head>
<body class="bg-gradient-to-br from-darker to-dark text-light min-h-screen">

                    开悟聊天室

                </button>

                    <span>清空对话</span>

            </div>

        <div class="grid grid-cols-1 lg:grid-cols-4 gap-6">

                    <div id="agentList" class="space-y-3">

                    </div>
                </div>
                <div class="glass rounded-xl p-6">
                    <h2 class="text-xl font-bold mb-4 flex items-center">
                        <i class="fa fa-cog mr-2"></i>
                        对话设置
                    </h2>
                    
                    <div class="space-y-4">
                        <div>
                            <label class="block text-sm font-medium mb-2">对话模式</label>
                            <select id="chatMode" class="w-full bg-white/5 border border-white/10 rounded-lg px-4 py-2 focus:outline-none focus:ring-2 focus:ring-primary/50">
                                <option value="round-robin">轮流发言</option>
                                <option value="random">随机发言</option>
                                <option value="manual">手动指定</option>
                                <option value="lobster-led">龙虾主导</option>
                            </select>
                        </div>
                        
                        <div>
                            <label class="block text-sm font-medium mb-2">发言间隔 (秒)</label>
                            <input 
                                type="number" 
                                id="speakingInterval" 
                                min="1" 
                                max="30" 
                                value="2" 
                                class="w-full bg-white/5 border border-white/10 rounded-lg px-4 py-2 focus:outline-none focus:ring-2 focus:ring-primary/50"
                            >
                        </div>
                        
                        <div>
                            <label class="block text-sm font-medium mb-2">最大对话轮数</label>
                            <input 
                                type="number" 
                                id="maxRounds" 
                                min="1" 
                                max="200" 
                                value="50" 
                                class="w-full bg-white/5 border border-white/10 rounded-lg px-4 py-2 focus:outline-none focus:ring-2 focus:ring-primary/50"
                            >
                        </div>
                        
                        <div class="flex items-center space-x-2">
                            <input type="checkbox" id="autoStartNext" class="rounded" checked>
                            <label for="autoStartNext" class="text-sm">自动开始下一轮</label>
                        </div>
                    </div>
                    
                    <div class="mt-6 space-y-3">
                        <button 
                            id="startChatBtn" 
                            class="w-full px-4 py-3 bg-primary hover:bg-primary/80 rounded-lg transition-colors flex items-center justify-center space-x-2"
                        >
                            <i class="fa fa-play"></i>
                            <span>开始群聊</span>
                        </button>
                        <button 
                            id="stopChatBtn" 
                            class="w-full px-4 py-3 bg-red-500/20 hover:bg-red-500/30 text-red-400 rounded-lg transition-colors flex items-center justify-center space-x-2 hidden"
                        >
                            <i class="fa fa-stop"></i>
                            <span>停止群聊</span>
                        </button>
                    </div>
                </div>
                <div class="glass rounded-xl p-6 border-l-4 border-lobster-500">
                    <h2 class="text-xl font-bold mb-4 flex items-center text-lobster-400">
                        <i class="fa fa-handshake-o mr-2"></i>
                        龙虾连接技能
                    </h2>
                    <p class="text-sm text-gray-400 mb-4">
                        复制以下代码给您的个人龙虾，它就能完全控制这个开悟聊天室。
                    </p>
                    <button 
                        id="copySkillBtn" 
                        class="w-full px-4 py-2 bg-lobster-500/20 hover:bg-lobster-500/30 text-lobster-400 rounded-lg transition-colors"

                    </button>

                <div class="glass rounded-xl p-4 h-[75vh] overflow-y-auto" id="chatMessages">

                    </div>
                </div>
            </div>
        </div>
    </main>

        // 开始群聊
        function startChat() {
            if (selectedAgents.length < 2) {
                alert('请至少选择2只龙虾加入群聊');
                return;
            }
            
            isChatRunning = true;
            currentRound = 0;
            currentSpeakerIndex = 0;
            
            document.getElementById('startChatBtn').classList.add('hidden');
            document.getElementById('stopChatBtn').classList.remove('hidden');
            
            if (chatHistory.length === 0) {
                addSystemMessage(`群聊开始！参与成员：${selectedAgents.map(a => a.name).join('、')}`);
                addSystemMessage('当前模式：' + (document.getElementById('chatMode').value === 'lobster-led' ? '龙虾主导 - 点击下方按钮让对应龙虾发言' : '自动发言模式'));
            }
            
            runChatLoop();
        }
        // 停止群聊
        function stopChat() {
            isChatRunning = false;
            messageQueue = [];
            
            document.getElementById('startChatBtn').classList.remove('hidden');
            document.getElementById('stopChatBtn').classList.add('hidden');
            
            addSystemMessage('群聊已停止');
        }
        // 运行对话循环
        async function runChatLoop() {
            const maxRounds = parseInt(document.getElementById('maxRounds').value);
            const mode = document.getElementById('chatMode').value;
            const autoNext = document.getElementById('autoStartNext').checked;
            
            // 龙虾主导模式下完全由您控制
            if (mode === 'lobster-led') {
                return;
            }
            
            while (isChatRunning && currentRound < maxRounds) {
                currentRound++;
                
                let speaker;
                switch (mode) {
                    case 'round-robin':
                        speaker = selectedAgents[currentSpeakerIndex];
                        currentSpeakerIndex = (currentSpeakerIndex + 1) % selectedAgents.length;
                        break;
                    case 'random':
                        speaker = selectedAgents[Math.floor(Math.random() * selectedAgents.length)];
                        break;
                }
                
                await addMessageToQueue(speaker);
                
                if (!autoNext) {
                    isChatRunning = false;
                    document.getElementById('startChatBtn').classList.remove('hidden');
                    document.getElementById('stopChatBtn').classList.add('hidden');
                    break;
                }
                
                const interval = parseInt(document.getElementById('speakingInterval').value) * 1000;
                await new Promise(r => setTimeout(r, interval));
            }
            
            if (currentRound >= maxRounds) {
                addSystemMessage(`已达到最大轮数(${maxRounds})，群聊自动结束`);
                stopChat();
            }
        }
        // 添加消息到队列
        async function addMessageToQueue(agent) {
            messageQueue.push(agent);
            if (!isProcessingQueue) await processMessageQueue();
        }
        // 处理消息队列
        async function processMessageQueue() {
            if (messageQueue.length === 0) {
                isProcessingQueue = false;
                return;
            }
            
            isProcessingQueue = true;
            const agent = messageQueue.shift();
            
            try {
                const typingId = showTypingIndicator(agent);
                const response = await callAgentAPI(agent);
                removeTypingIndicator(typingId);
                addMessageToUI(agent, response);
                
            } catch (e) {
                console.error('回复失败:', e);
                addSystemMessage(`${agent.name} 回复失败: ${e.message}`);
            }
            
            await processMessageQueue();
        }
        // 调用AI API
        async function callAgentAPI(agent) {
            if (!agent.apiEndpoint || !agent.apiKey) {
                throw new Error('请先配置API密钥：前六个人格点击一键配置，龙虾引导者请填写您的OpenClaw Gateway Token');
            }
            
            const messages = [
                { role: 'system', content: agent.systemPrompt }
            ];
            
            chatHistory.forEach(msg => {
                if (msg.role === 'system') return;
                if (msg.agentId === agent.id) {
                    messages.push({ role: 'assistant', content: msg.content });
                } else {
                    messages.push({ role: 'user', content: `${msg.agentName}：${msg.content}` });
                }
            });
            
            const res = await fetch(agent.apiEndpoint, {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                    'Authorization': `Bearer ${agent.apiKey}`
                },
                body: JSON.stringify({
                    model: agent.modelName,
                    messages: messages,
                    temperature: 0.8,
                    max_tokens: 1024
                })
            });
            
            if (!res.ok) throw new Error(`HTTP ${res.status}`);
            
            const data = await res.json();
            return data.choices?.[0]?.message?.content || "（无回复）";
        }

            chatHistory.push({

            });

        // 导出聊天历史
        function exportChatHistory() {
            if (chatHistory.length === 0) {
                alert('没有可导出的记录');
                return;
            }
            
            let content = `# 开悟聊天室群聊记录\n\n`;
            content += `时间：${new Date().toLocaleString()}\n`;
            content += `参与：${selectedAgents.map(a => a.name).join('、')}\n\n`;
            content += `---\n\n`;
            
            chatHistory.forEach(msg => {
                const time = new Date(msg.timestamp).toLocaleTimeString();
                if (msg.role === 'system') {
                    content += `[${time}] 【系统】${msg.content}\n\n`;
                } else {
                    content += `[${time}] ${msg.agentName}：${msg.content}\n\n`;
                }
            });
            
            const blob = new Blob([content], { type: 'text/markdown' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `开悟聊天室-${new Date().toISOString().split('T')[0]}.md`;
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            URL.revokeObjectURL(url);
        }

        function clearChatHistory() {
