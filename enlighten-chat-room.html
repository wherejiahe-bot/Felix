<div class="chat-container">
        <div class="chat-header">
            <h1>龙虾一对一互动场</h1>
            <p>选择一位对话伙伴，与龙虾展开一对一交流</p>
        </div>
        <div class="controls">
            <label>选择对话伙伴：</label>
            <select id="partnerSelect">
                <option value="magpie">喜鹊女士 - 直觉家风水的幽默导师</option>
                      timestamp: new Date().toISOString()
            });
            
            const div = document.createElement('div');
            div.className = 'mb-4 flex justify-start';
            div.innerHTML = `
                <div class="w-8 h-8 rounded-full bg-gradient-to-br from-${agent.color}-500 to-${agent.color}-600 flex items-center justify-center text-sm font-bold mr-3 flex-shrink-0">
                    ${agent.avatar}
                </div>
                <div class="message-bubble bg-white/10 text-white rounded-t-lg rounded-br-lg px-4 py-3">
                    <div class="text-xs text-${agent.color}-400 font-medium mb-1">${agent.name}</div>
                    <p>${content}</p>
                </div>
            `;
            chat.appendChild(div);
            chat.scrollTop = chat.scrollHeight;
        }

        // 添加系统消息
        function addSystemMessage(content) {
            const chat = document.getElementById('chatMessages');
            
            chatHistory.push({
                role: 'system',
                content: content,
                timestamp: new Date().toISOString()
            });
            
            const div = document.createElement('div');
            div.className = 'mb-4 flex justify-center';
            div.innerHTML = `
                <div class="message-bubble bg-gray-700/50 text-gray-300 rounded-lg px-4 py-2 text-sm">
                    ${content}
                </div>
            `;
            chat.appendChild(div);
            chat.scrollTop = chat.scrollHeight;
        }

        // 发送话题
        function sendTopic() {
            const input = document.getElementById('topicInput');
            const topic = input.value.trim();
            if (!topic) return;
            
            addSystemMessage(`话题：${topic}`);
            input.value = '';
        }

        // 导出聊天历史
        function exportChatHistory() {
            if (chatHistory.length === 0) {
                alert('没有可导出的记录');
                return;
            }
            
            let content = `# 七龙虾群聊记录\n\n`;
            content += `时间：${new Date().toLocaleString()}\n`;
            content += `参与：${selectedAgents.map(a => a.name).join('、')}\n\n`;
            content += `---\n\n`;
            
            chatHistory.forEach(msg => {
                const time = new Date(msg.timestamp).toLocaleTimeString();
                if (msg.role === 'system') {
                    content += `[${time}] 【系统】${msg.content}\n\n`;
                } else {
                    content += `[${time}] ${msg.agentName}：${msg.content}\n\n`;
                }
            });
            
            const blob = new Blob([content], { type: 'text/markdown' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `七龙虾群聊-${new Date().toISOString().split('T')[0]}.md`;
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            URL.revokeObjectURL(url);
        }

        // 清空聊天历史
        function clearChatHistory() {
            if (!confirm('确定要清空所有对话吗？')) return;
            
            chatHistory = [];
            currentRound = 0;
            currentSpeakerIndex = 0;
            
            document.getElementById('chatMessages').innerHTML = `
                <div class="text-center text-gray-500 py-20">
                    <i class="fa fa-comments text-5xl mb-6"></i>
                    <h3 class="text-xl font-bold mb-2">对话已清空</h3>
                    <p class="max-w-md mx-auto">
                        点击下方按钮让龙虾们开始新的讨论。
                    </p>
                </div>
            `;
        }
    </script>
